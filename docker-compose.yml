services:
  hearth:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgres://hearth:hearth@db:5432/hearth
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_MODEL_ID=${OPENROUTER_MODEL_ID}
      - USE_CONTAINERS=${USE_CONTAINERS:-false}
      - CONTAINER_IMAGE=${CONTAINER_IMAGE:-python:3.12-slim}
      - AGENT_WORKSPACE=${AGENT_WORKSPACE:-/home/agent}
      # Langfuse: reach langfuse-web by service name over the shared network.
      # Leave the keys blank to disable tracing (see src/observability).
      - LANGFUSE_BASE_URL=${LANGFUSE_BASE_URL:-http://langfuse-web:3000}
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      db:
        condition: service_healthy
    networks:
      - hearth-internal
      - hearth-external
      - hearth-observability
  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=hearth
      - POSTGRES_PASSWORD=hearth
      - POSTGRES_DB=hearth
    volumes:
      - hearth-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hearth"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - hearth-internal

volumes:
  hearth-data:

networks:
  hearth-internal:
    internal: true
  hearth-external:
  # Shared with the Langfuse stack (docker-compose.langfuse.yml).
  # Create once before `up`:  docker network create hearth-observability
  hearth-observability:
    external: true
